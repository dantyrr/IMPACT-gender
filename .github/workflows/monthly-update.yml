name: Monthly Data Pipeline

on:
  schedule:
    # Run at 2 AM UTC on the 1st of each month
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      journal:
        description: 'Journal slug to process (leave blank for all)'
        required: false
        default: ''
      years:
        description: 'Year range as START-END (e.g., 2022-2026)'
        required: false
        default: ''

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: python scripts/init_db.py

      - name: Run data pipeline
        env:
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL || 'dantyrr@gmail.com' }}
        run: |
          if [ -n "${{ github.event.inputs.journal }}" ]; then
            python scripts/run_pipeline.py --journal "${{ github.event.inputs.journal }}" ${{ github.event.inputs.years && format('--years {0}', github.event.inputs.years) || '' }}
          else
            python scripts/run_pipeline.py ${{ github.event.inputs.years && format('--years {0}', github.event.inputs.years) || '' }}
          fi

      - name: Compute rolling IF snapshots
        run: python scripts/compute_snapshots.py

      - name: Validate exports
        run: python scripts/validate_exports.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "IMPACT Bot"
          git add website/data/
          git diff --staged --quiet || git commit -m "chore: monthly data update $(date +%Y-%m-%d)"
          git push
